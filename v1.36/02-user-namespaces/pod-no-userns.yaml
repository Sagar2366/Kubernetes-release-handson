# User Namespaces -- Baseline Pod WITHOUT User Namespace Isolation
#
# Default behavior: hostUsers not set (defaults to true).
# Root (UID 0) inside the container IS root (UID 0) on the host.
# A container escape = full root access on the node.
#
# We use kubectl debug node/ to prove the process runs as UID 0 on the host.
#
# Docs:
#   User namespaces:       https://kubernetes.io/docs/concepts/workloads/pods/user-namespaces/
#   Pod security context:  https://kubernetes.io/docs/tasks/configure-pod-container/security-context/
#   KEP #127:              https://github.com/kubernetes/enhancements/tree/master/keps/sig-node/127-user-namespaces

apiVersion: v1
kind: Pod
metadata:
  name: no-userns
  namespace: userns-demo
spec:
  containers:
  - name: debug
    image: busybox:1.36
    command: ["sh", "-c", "sleep 3600"]
    securityContext:
      runAsUser: 0              # Root inside container = root on host (DANGEROUS)
      runAsGroup: 0
  restartPolicy: Never
